<!DOCTYPE html>
<html lang="de">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>LumaFlow</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="app">

    <aside class="sidebar">

        <div class="logo">

            💡 LumaFlow

        </div>

        <nav>

            <button id="navDashboard" onclick="navigate('dashboard')">
                <span>🏠</span>
                <span>Dashboard</span>
            </button>

            <button id="navProjects" onclick="navigate('projects')">
                <span>📁</span>
                <span>Projekte</span>
            </button>

            <button id="navCalendar" onclick="navigate('calendar')">
                <span>🗓️</span>
                <span>Kalender</span>
            </button>

            <hr>

            <button id="navTasks" onclick="navigate('tasks')">
                <span>✅</span>
                <span>Aufgaben</span>
            </button>

            <button id="navMeetings" onclick="navigate('meetings')">
                <span>📅</span>
                <span>Besprechungen</span>
            </button>

            <button id="navProtocols" onclick="navigate('protocols')">
                <span>📝</span>
                <span>Protokolle</span>
            </button>

            <button id="navContacts" onclick="navigate('contacts')">
                <span>👥</span>
                <span>Kontakte</span>
            </button>

        </nav>

        <div class="sidebar-footer">

            <hr>

            <button id="navSettings" onclick="showSettings()">

                <span>⚙️</span>

                <span>Einstellungen</span>

            </button>

        </div>

    </aside>

<main class="content">

    <header class="topbar">

        <div class="topbar-left">

            <button class="menu-btn">

☰

            </button>

            <input
                id="globalSearch"
                type="text"
                placeholder="🔍 Projekte, Aufgaben, Meetings suchen...">

        </div>

        <div class="topbar-right">

            <button class="icon-btn">

🔔

            </button>

            <div class="user-box">

                <div class="avatar">

C

                </div>

                <div>

<b>Christoph</b>

<br>

<small>LumaFlow</small>

                </div>

            </div>

        </div>

    </header>

    <div id="page"></div>

</main>

</div>

<script>

function setActiveNavigation(id){

    document
        .querySelectorAll(".sidebar button")
        .forEach(b=>b.classList.remove("active"));

    const btn=document.getElementById(id);

    if(btn)
        btn.classList.add("active");

}

function navigate(page){

    switch(page){

        case "dashboard":

            setActiveNavigation("navDashboard");
            showDashboard();
            break;

        case "projects":

            setActiveNavigation("navProjects");
            showProjects();
            break;

        case "calendar":

            setActiveNavigation("navCalendar");
            showCalendar();
            break;

        case "tasks":

            setActiveNavigation("navTasks");
            showTasks();
            break;

        case "meetings":

            setActiveNavigation("navMeetings");
            showMeetings();
            break;

        case "protocols":

            setActiveNavigation("navProtocols");
            showProtocols();
            break;

        case "contacts":

            setActiveNavigation("navContacts");
            showContacts();
            break;

    }

}

window.onload=()=>{

    navigate("dashboard");

};

</script>
    
<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.18/index.global.min.js"></script>
    
<script src="modules/dashboard.js"></script>
<script src="modules/projects.js"></script>
<script src="modules/tasks.js"></script>

<script src="modules/calendar.js"></script>

<script src="modules/meetings/index.js"></script>
<script src="modules/meetings/parser.js"></script>
<script src="modules/meetings/editor.js"></script>
<script src="modules/meetings/topic.js"></script>
<script src="modules/meetings/note.js"></script>
<script src="modules/meetings/protocol.js"></script>

<script src="modules/protocols.js"></script>
<script src="modules/contacts.js"></script>
<script src="modules/projectContacts.js"></script>
<script src="modules/documents.js"></script>
<script src="modules/settings.js"></script>
    
<script src="app.js"></script>

</body>

</html>
